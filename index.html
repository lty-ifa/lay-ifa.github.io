<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Esther 小懿｜財務工具</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans TC', 'PingFang TC', sans-serif;
      background: #f5f0eb;
      color: #333;
      min-height: 100vh;
      padding: 48px 16px;
    }

    .container {
      max-width: 560px;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo {
      font-size: 13px;
      color: #9b8b7a;
      letter-spacing: 0.1em;
      margin-bottom: 8px;
    }

    h1 {
      font-size: 24px;
      font-weight: 700;
      color: #4a3728;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 14px;
      color: #9b8b7a;
    }

    .tools {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 40px;
    }

    .tool-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(74,55,40,0.08);
      padding: 28px 28px;
      display: flex;
      align-items: center;
      gap: 20px;
      text-decoration: none;
      color: inherit;
      transition: box-shadow 0.2s, transform 0.15s;
    }

    .tool-card:hover {
      box-shadow: 0 6px 24px rgba(74,55,40,0.15);
      transform: translateY(-2px);
    }

    .tool-icon {
      font-size: 36px;
      flex-shrink: 0;
      width: 56px;
      height: 56px;
      background: #f5f0eb;
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .tool-info { flex: 1; }

    .tool-title {
      font-size: 17px;
      font-weight: 700;
      color: #4a3728;
      margin-bottom: 4px;
    }

    .tool-desc {
      font-size: 13px;
      color: #9b8b7a;
      line-height: 1.6;
    }

    .tool-arrow {
      font-size: 18px;
      color: #c0a890;
      flex-shrink: 0;
    }

    .contact {
      text-align: center;
      padding: 24px 20px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 2px 12px rgba(74,55,40,0.07);
    }

    .contact-label {
      font-size: 13px;
      color: #9b8b7a;
      margin-bottom: 14px;
    }

    .contact-items {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 24px;
      flex-wrap: wrap;
    }

    .contact-item {
      font-size: 14px;
      font-weight: 600;
      color: #4a3728;
      display: flex;
      align-items: center;
      gap: 6px;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <div class="logo">@esther_asset</div>
      <h1>Esther 小懿</h1>
      <p class="tagline">資產結構設計師｜獨立財務顧問</p>
    </div>

    <div class="tools">
      <a href="booking.html" class="tool-card">
        <div class="tool-icon">📅</div>
        <div class="tool-info">
          <div class="tool-title">預約免費諮詢</div>
          <div class="tool-desc">填寫基本資料與諮詢需求，Esther 會在 1-2 個工作日內回覆確認時間</div>
        </div>
        <div class="tool-arrow">›</div>
      </a>

      <a href="asset-forecast.html" class="tool-card">
        <div class="tool-icon">📊</div>
        <div class="tool-info">
          <div class="tool-title">資產預測試算</div>
          <div class="tool-desc">輸入現有資產、負債與年收入，試算距離財務目標還需要多少時間</div>
        </div>
        <div class="tool-arrow">›</div>
      </a>
    </div>

    <div class="contact">
      <div class="contact-label">有任何問題？歡迎直接聯絡我</div>
      <div class="contact-items">
        <div class="contact-item">💬 LINE：0925352662</div>
        <div class="contact-item">📷 IG：@esther_asset</div>
      </div>
    </div>

  </div>
</body>
</html>
