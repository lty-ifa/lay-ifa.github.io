<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OI 異常掃描</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #080a10;
      --panel: rgba(13, 18, 28, 0.86);
      --panel-strong: rgba(17, 25, 38, 0.94);
      --ink: #f4f7fb;
      --muted: #93a4b8;
      --line: rgba(148, 163, 184, 0.24);
      --strong: #ff4d6d;
      --watch: #ffb020;
      --ok: #19e6a1;
      --accent: #1bd8ff;
      --accent-2: #f053c5;
      --soft-blue: rgba(27, 216, 255, 0.12);
      --soft-red: rgba(255, 77, 109, 0.13);
      --soft-amber: rgba(255, 176, 32, 0.13);
      --soft-green: rgba(25, 230, 161, 0.13);
      --shadow: 0 22px 60px rgba(0, 0, 0, 0.38);
      --glow-cyan: 0 0 26px rgba(27, 216, 255, 0.26);
      --glow-green: 0 0 26px rgba(25, 230, 161, 0.22);
      --glow-red: 0 0 26px rgba(255, 77, 109, 0.22);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background:
        linear-gradient(115deg, rgba(27, 216, 255, 0.14), transparent 34%),
        linear-gradient(245deg, rgba(240, 83, 197, 0.13), transparent 38%),
        repeating-linear-gradient(90deg, rgba(255, 255, 255, 0.025) 0 1px, transparent 1px 52px),
        repeating-linear-gradient(0deg, rgba(255, 255, 255, 0.018) 0 1px, transparent 1px 52px),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      line-height: 1.5;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .app {
      width: min(1180px, calc(100% - 28px));
      margin: 0 auto;
      padding: 24px 0 42px;
    }

    body.locked .app {
      display: none;
    }

    .gate {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    body.locked .gate {
      display: flex;
    }

    .gate-card {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .gate-card h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .gate-card p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .gate-card label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .gate-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px;
      color: var(--ink);
      background: rgba(255, 255, 255, 0.06);
      outline: none;
    }

    .gate-card input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(27, 216, 255, 0.16);
    }

    .gate-card button {
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      border: 0;
      border-radius: 6px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #071018;
      font-weight: 850;
      cursor: pointer;
    }

    .gate-error {
      min-height: 20px;
      margin-top: 10px;
      color: var(--strong);
      font-size: 13px;
      font-weight: 750;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
      padding: 14px 0 4px;
    }

    .brand {
      min-width: 0;
    }

    h1 {
      margin: 0;
      font-size: clamp(28px, 5vw, 48px);
      letter-spacing: 0;
      text-shadow: 0 0 22px rgba(27, 216, 255, 0.22);
    }

    .subline {
      color: var(--muted);
      font-size: 14px;
      margin-top: 3px;
      font-weight: 700;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-height: 36px;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      white-space: nowrap;
      font-size: 13px;
    }

    .top-actions {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      gap: 10px;
      flex-wrap: wrap;
    }

    .nav-link {
      min-height: 36px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--accent);
      font-size: 13px;
      font-weight: 750;
      text-decoration: none;
      white-space: nowrap;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--muted);
      box-shadow: 0 0 14px rgba(147, 164, 184, 0.35);
    }

    .dot.live {
      background: var(--ok);
      box-shadow: 0 0 18px rgba(25, 230, 161, 0.75);
    }

    .layout {
      display: block;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .controls {
      padding: 16px;
      position: sticky;
      top: 14px;
    }

    .section-title {
      font-weight: 750;
      margin: 0 0 10px;
      font-size: 15px;
    }

    .field {
      margin-bottom: 14px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    textarea,
    input,
    select {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      background: rgba(255, 255, 255, 0.06);
      color: var(--ink);
      outline: none;
    }

    textarea {
      min-height: 124px;
      resize: vertical;
    }

    textarea:focus,
    input:focus,
    select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(27, 216, 255, 0.16);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .switch-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      margin-bottom: 12px;
      background: #fbfcfd;
    }

    .switch-row span {
      font-size: 13px;
      color: var(--muted);
    }

    .switch-row input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
    }

    .actions {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      margin-top: 16px;
    }

    .primary,
    .secondary {
      border: 0;
      border-radius: 6px;
      min-height: 44px;
      padding: 0 18px;
      cursor: pointer;
      font-weight: 850;
      letter-spacing: 0;
    }

    .primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #061018;
      box-shadow: 0 0 0 1px rgba(255, 255, 255, 0.12) inset, 0 14px 36px rgba(27, 216, 255, 0.22);
    }

    .primary:disabled {
      cursor: progress;
      opacity: 0.72;
    }

    .secondary {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--ink);
    }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      padding: 14px;
      min-height: 92px;
      position: relative;
      overflow: hidden;
      background: linear-gradient(145deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.025));
    }

    .metric::before {
      content: "";
      position: absolute;
      inset: 0;
      border-top: 1px solid rgba(27, 216, 255, 0.34);
      pointer-events: none;
    }

    .metric .label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
    }

    .metric .value {
      font-size: 26px;
      font-weight: 800;
      margin-top: 6px;
      color: var(--ink);
      text-shadow: 0 0 18px rgba(27, 216, 255, 0.25);
    }

    .metric .hint {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .results {
      min-width: 0;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      padding: 15px 16px;
      margin-bottom: 12px;
      background: linear-gradient(135deg, rgba(27, 216, 255, 0.11), rgba(240, 83, 197, 0.09));
    }

    .toolbar-actions {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-top: 0;
      flex-shrink: 0;
    }

    .toolbar strong {
      display: block;
      font-size: 16px;
    }

    .toolbar span {
      display: block;
      color: var(--muted);
      font-size: 12px;
    }

    .segmented {
      display: inline-grid;
      grid-template-columns: repeat(2, minmax(72px, 1fr));
      border: 1px solid var(--line);
      border-radius: 6px;
      overflow: hidden;
      background: #fff;
    }

    .segmented button {
      min-height: 36px;
      border: 0;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      padding: 0 12px;
    }

    .segmented button.active {
      background: var(--ink);
      color: #fff;
    }

    .cards {
      display: grid;
      gap: 12px;
    }

    .coin-card {
      padding: 16px;
      border-left: 0;
      position: relative;
      overflow: hidden;
      background: var(--panel-strong);
    }

    .coin-card.signal-long {
      border-color: rgba(25, 230, 161, 0.44);
      background: linear-gradient(135deg, rgba(25, 230, 161, 0.16), rgba(13, 18, 28, 0.94) 42%);
      box-shadow: var(--shadow), var(--glow-green);
    }

    .coin-card.signal-short {
      border-color: rgba(255, 77, 109, 0.46);
      background: linear-gradient(135deg, rgba(255, 77, 109, 0.16), rgba(13, 18, 28, 0.94) 42%);
      box-shadow: var(--shadow), var(--glow-red);
    }

    .coin-card.strong {
      border-color: rgba(255, 77, 109, 0.46);
      background: linear-gradient(135deg, rgba(255, 77, 109, 0.16), rgba(13, 18, 28, 0.94) 42%);
    }

    .coin-card.watch {
      border-color: rgba(255, 176, 32, 0.42);
      background: linear-gradient(135deg, rgba(255, 176, 32, 0.14), rgba(13, 18, 28, 0.94) 42%);
    }

    .coin-card.normal {
      border-color: var(--line);
    }

    .coin-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .coin-body {
      display: grid;
      grid-template-columns: minmax(180px, 0.85fr) minmax(260px, 1.15fr);
      gap: 12px;
      align-items: stretch;
    }

    .primary-metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.05);
      padding: 13px;
      display: grid;
      align-content: space-between;
      min-height: 178px;
    }

    .primary-metric span,
    .threshold span,
    .mini-cell span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .primary-metric strong {
      display: block;
      font-size: clamp(40px, 7vw, 68px);
      line-height: 1;
      letter-spacing: 0;
    }

    .primary-metric em {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      min-height: 26px;
      border-radius: 999px;
      padding: 3px 9px;
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid var(--line);
      color: var(--muted);
      font-style: normal;
      font-size: 12px;
      font-weight: 800;
    }

    .thresholds {
      display: none;
    }

    .threshold {
      border-radius: 6px;
      padding: 9px;
      background: var(--soft-blue);
      border: 1px solid #c9deef;
    }

    .threshold strong,
    .mini-cell strong {
      display: block;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .value-oi {
      color: #ffd166;
    }

    .value-strength {
      color: #ffb020;
    }

    .value-distance {
      color: var(--accent);
    }

    .value-price {
      color: #c4f1ff;
    }

    .value-threshold {
      color: #b8a7ff;
    }

    .value-time {
      color: #a7b7ca;
    }

    .mini-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 9px;
    }

    .mini-cell {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.055);
      padding: 9px;
      min-height: 66px;
    }

    .symbol {
      font-size: 22px;
      font-weight: 850;
      color: #ffe66d;
      text-shadow: 0 0 18px rgba(255, 230, 109, 0.28);
    }

    .time {
      color: #7dd3fc;
      font-size: 12px;
    }

    .badges {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: flex-end;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      border-radius: 999px;
      padding: 3px 9px;
      font-size: 12px;
      font-weight: 750;
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.06);
      color: var(--muted);
      white-space: nowrap;
    }

    .badge.strong {
      color: var(--strong);
      border-color: rgba(255, 77, 109, 0.45);
      background: var(--soft-red);
    }

    .badge.watch {
      color: var(--watch);
      border-color: rgba(255, 176, 32, 0.45);
      background: var(--soft-amber);
    }

    .badge.long {
      color: var(--ok);
      border-color: rgba(25, 230, 161, 0.48);
      background: var(--soft-green);
    }

    .badge.short {
      color: #ff8bb9;
      border-color: rgba(240, 83, 197, 0.48);
      background: rgba(240, 83, 197, 0.13);
    }

    .coin-grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(0, 1fr));
      gap: 9px;
    }

    .cell {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.78);
      padding: 9px;
      min-height: 68px;
    }

    .cell span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .cell strong {
      display: block;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .positive {
      color: var(--ok);
      text-shadow: 0 0 14px rgba(25, 230, 161, 0.3);
    }

    .negative {
      color: var(--strong);
      text-shadow: 0 0 14px rgba(255, 77, 109, 0.28);
    }

    .long-text {
      color: var(--ok);
      text-shadow: 0 0 18px rgba(25, 230, 161, 0.34);
    }

    .short-text {
      color: var(--strong);
      text-shadow: 0 0 18px rgba(255, 77, 109, 0.32);
    }

    .progress-wrap {
      display: grid;
      gap: 8px;
      margin: 12px 0;
    }

    .progress {
      height: 9px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.08);
    }

    .progress div {
      height: 100%;
      width: 0;
      background: linear-gradient(90deg, var(--accent), var(--ok), var(--accent-2));
      transition: width 160ms ease;
    }

    .log {
      padding: 12px 14px;
      color: var(--muted);
      font-size: 13px;
      min-height: 44px;
      margin-bottom: 12px;
      background: rgba(7, 12, 20, 0.78);
    }

    .empty {
      text-align: center;
      padding: 38px 18px;
      color: var(--muted);
    }

    @media (max-width: 920px) {
      .layout {
        grid-template-columns: 1fr;
      }

      .controls {
        position: static;
      }

      .metrics {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .coin-body {
        grid-template-columns: 1fr;
      }

      .coin-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 560px) {
      .app {
        width: min(100% - 20px, 1180px);
        padding-top: 14px;
      }

      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .top-actions,
      .status-pill,
      .nav-link {
        width: 100%;
      }

      .top-actions {
        justify-content: stretch;
      }

      .status-pill {
        justify-content: center;
      }

      .grid-2,
      .actions,
      .metrics {
        grid-template-columns: 1fr;
      }

      .mini-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .toolbar,
      .coin-head {
        flex-direction: column;
        align-items: stretch;
      }

      .toolbar-actions {
        justify-content: stretch;
      }

      .badges {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body class="locked">
  <section class="gate" aria-label="密碼保護">
    <form class="gate-card" id="gateForm">
      <h1>OI 異常掃描</h1>
      <p>輸入密碼後進入工具。</p>
      <label for="passwordInput">Password</label>
      <input id="passwordInput" type="password" autocomplete="current-password" inputmode="text">
      <button type="submit">進入</button>
      <div class="gate-error" id="gateError"></div>
    </form>
  </section>

  <main class="app">
    <header class="topbar">
      <div class="brand">
        <h1>OI 異常掃描</h1>
        <div class="subline">Binance USDT-M Futures</div>
      </div>
      <div class="top-actions">
        <a class="nav-link" href="./index.html">工具首頁</a>
        <div class="status-pill" id="statusPill">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">待掃描</span>
        </div>
      </div>
    </header>

    <section class="layout">
      <section class="results">
        <div class="metrics">
          <div class="panel metric">
            <div class="label">掃描幣種</div>
            <div class="value" id="metricTotal">0</div>
            <div class="hint">24h 成交額 >= 5000萬</div>
          </div>
          <div class="panel metric">
            <div class="label">EMA 訊號</div>
            <div class="value" id="metricStrong">0</div>
            <div class="hint">1H EMA7 上下穿 4H EMA7</div>
          </div>
          <div class="panel metric">
            <div class="label">OI 確認</div>
            <div class="value" id="metricWatch">增倉</div>
            <div class="hint">只列 OI 增倉</div>
          </div>
          <div class="panel metric">
            <div class="label">更新時間</div>
            <div class="value" id="metricTime">--</div>
            <div class="hint">手機本地時間</div>
          </div>
        </div>

        <div class="panel toolbar">
          <div>
            <strong id="resultTitle">最新 OI 增倉 + EMA 跨週期交叉</strong>
            <span id="resultSubtitle">尚未掃描</span>
          </div>
          <div class="toolbar-actions">
            <button class="primary" id="scanButton" type="button">開始掃描</button>
          </div>
        </div>

        <div class="panel log">
          <div class="progress-wrap" id="progressWrap" hidden>
            <div id="progressLabel">0 / 0</div>
            <div class="progress"><div id="progressBar"></div></div>
          </div>
          <div id="logText">按開始掃描後，結果會顯示在下方。</div>
        </div>

        <div class="cards" id="cards"></div>
      </section>
    </section>
  </main>

  <script>
    const PASSWORD_HASH = "c1f330d0aff31c1c87403f1e4347bcc21aff7c179908723535f2b31723702525";
    const SESSION_KEY = "marketToolsUnlocked";
    const gateForm = document.getElementById("gateForm");
    const passwordInput = document.getElementById("passwordInput");
    const gateError = document.getElementById("gateError");

    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    function unlock() {
      document.body.classList.remove("locked");
      sessionStorage.setItem(SESSION_KEY, "1");
    }

    if (sessionStorage.getItem(SESSION_KEY) === "1") {
      unlock();
    } else {
      passwordInput.focus();
    }

    gateForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      gateError.textContent = "";
      const hash = await sha256(passwordInput.value);
      if (hash === PASSWORD_HASH) {
        unlock();
        passwordInput.value = "";
      } else {
        gateError.textContent = "密碼錯誤";
        passwordInput.select();
      }
    });

    const OI_API = "https://fapi.binance.com/futures/data/openInterestHist";
    const KLINE_API = "https://fapi.binance.com/fapi/v1/klines";
    const TICKER_API = "https://fapi.binance.com/fapi/v1/ticker/24hr";
    const MIN_QUOTE_VOLUME = 50_000_000;
    const FIXED_PERIOD = "4h";
    const FIXED_LIMIT = 500;
    const EMA_DIFF_MIN = 0.2;

    const els = {
      scan: document.getElementById("scanButton"),
      cards: document.getElementById("cards"),
      log: document.getElementById("logText"),
      progressWrap: document.getElementById("progressWrap"),
      progressLabel: document.getElementById("progressLabel"),
      progressBar: document.getElementById("progressBar"),
      statusText: document.getElementById("statusText"),
      statusDot: document.getElementById("statusDot"),
      metricTotal: document.getElementById("metricTotal"),
      metricStrong: document.getElementById("metricStrong"),
      metricWatch: document.getElementById("metricWatch"),
      metricTime: document.getElementById("metricTime"),
      resultTitle: document.getElementById("resultTitle"),
      resultSubtitle: document.getElementById("resultSubtitle"),
    };

    let lastRows = [];

    function parseSymbols(text) {
      return [...new Set(text.split(",").map((s) => s.trim().toUpperCase()).filter(Boolean))];
    }

    function percentile(values, p) {
      if (!values.length) return null;
      const xs = [...values].sort((a, b) => a - b);
      const k = (xs.length - 1) * p;
      const lo = Math.floor(k);
      const hi = Math.ceil(k);
      if (lo === hi) return xs[lo];
      return xs[lo] * (hi - k) + xs[hi] * (k - lo);
    }

    function pctChange(next, prev) {
      if (!prev) return null;
      return ((next - prev) / prev) * 100;
    }

    function fmtPct(value) {
      return Number.isFinite(value) ? `${value.toFixed(2)}%` : "N/A";
    }

    function fmtNum(value) {
      if (!Number.isFinite(value)) return "N/A";
      const abs = Math.abs(value);
      const sign = value < 0 ? "-" : "";
      if (abs >= 1_000_000_000) return `${sign}${(abs / 1_000_000_000).toFixed(2)}B`;
      if (abs >= 1_000_000) return `${sign}${(abs / 1_000_000).toFixed(2)}M`;
      if (abs >= 1_000) return `${sign}${(abs / 1_000).toFixed(2)}K`;
      return `${sign}${abs.toFixed(2)}`;
    }

    function fmtRatio(value) {
      return Number.isFinite(value) ? value.toFixed(2) : "N/A";
    }

    function fmtTime(ts) {
      if (!Number.isFinite(ts)) return "--";
      return new Intl.DateTimeFormat("zh-TW", {
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).format(new Date(ts));
    }

    function levelPriority(level) {
      if (level === "強異常") return 0;
      if (level === "注意") return 1;
      return 2;
    }

    function signalPriority(row) {
      if (row.oiConfirm) return 0;
      return 2;
    }

    async function fetchJson(url) {
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error(`${response.status}`);
      const data = await response.json();
      if (data && typeof data === "object" && data.code) throw new Error(data.msg || data.code);
      return data;
    }

    async function fetchLiquiditySymbols() {
      const data = await fetchJson(TICKER_API);
      if (!Array.isArray(data)) return [];
      return data
        .map((row) => ({
          symbol: String(row.symbol || "").toUpperCase(),
          volume: Number(row.quoteVolume),
        }))
        .filter((row) => row.symbol.endsWith("USDT"))
        .filter((row) => Number.isFinite(row.volume) && row.volume >= MIN_QUOTE_VOLUME)
        .sort((a, b) => b.volume - a.volume)
        .map((row) => row.symbol);
    }

    async function getOiRows(symbol, period, limit) {
      const params = new URLSearchParams({ symbol, period, limit: String(Math.min(limit, 500)) });
      const data = await fetchJson(`${OI_API}?${params}`);
      if (!Array.isArray(data) || data.length < 30) return null;
      const rows = data
        .map((row) => ({
          ts: Number(row.timestamp),
          oi: Number(row.sumOpenInterestValue),
        }))
        .filter((row) => Number.isFinite(row.ts) && Number.isFinite(row.oi))
        .sort((a, b) => a.ts - b.ts);
      return rows.length >= 30 ? rows : null;
    }

    async function getKlineRows(symbol, interval, limit) {
      const params = new URLSearchParams({ symbol, interval, limit: String(Math.min(limit, 500)) });
      const data = await fetchJson(`${KLINE_API}?${params}`);
      if (!Array.isArray(data) || data.length < 30) return null;
      const now = Date.now();
      const rows = data
        .map((row) => ({
          openTime: Number(row[0]),
          close: Number(row[4]),
          closeTime: Number(row[6]),
        }))
        .filter((row) => Number.isFinite(row.openTime) && Number.isFinite(row.close) && Number.isFinite(row.closeTime))
        .filter((row) => row.closeTime <= now)
        .sort((a, b) => a.openTime - b.openTime);
      return rows.length >= 30 ? rows : null;
    }

    function emaSeries(values, length) {
      if (values.length < length) return [];
      const alpha = 2 / (length + 1);
      const result = Array(values.length).fill(null);
      let ema = values.slice(0, length).reduce((sum, value) => sum + value, 0) / length;
      result[length - 1] = ema;
      for (let i = length; i < values.length; i += 1) {
        ema = values[i] * alpha + ema * (1 - alpha);
        result[i] = ema;
      }
      return result;
    }

    function emptyEmaSignal() {
      return {
        ema1h7: null,
        ema4h7: null,
        emaSignal: null,
        emaSignalLabel: "無交叉",
        emaSignalSide: "",
        emaTs: null,
        emaDistancePct: null,
        priceConfirm: false,
        latestClose1h: null,
      };
    }

    function latestTimedValueAt(timedValues, ts) {
      for (let i = timedValues.length - 1; i >= 0; i -= 1) {
        if (timedValues[i].ts <= ts && Number.isFinite(timedValues[i].value)) return timedValues[i].value;
      }
      return null;
    }

    async function analyzeEmaCross(symbol, limit) {
      const rows1h = await getKlineRows(symbol, "1h", limit);
      const rows4h = await getKlineRows(symbol, "4h", limit);
      if (!rows1h || !rows4h) return emptyEmaSignal();

      const ema1h = emaSeries(rows1h.map((row) => row.close), 7);
      const ema4h = emaSeries(rows4h.map((row) => row.close), 7);
      const timed4h = rows4h.map((row, index) => ({ ts: row.closeTime, value: ema4h[index] }));
      const latestIndex = rows1h.length - 1;
      const prevIndex = latestIndex - 1;
      if (!Number.isFinite(ema1h[prevIndex]) || !Number.isFinite(ema1h[latestIndex])) {
        return emptyEmaSignal();
      }

      const prev4h = latestTimedValueAt(timed4h, rows1h[prevIndex].closeTime);
      const latest4h = latestTimedValueAt(timed4h, rows1h[latestIndex].closeTime);
      if (!Number.isFinite(prev4h) || !Number.isFinite(latest4h)) return emptyEmaSignal();

      const crossedUp = ema1h[prevIndex] <= prev4h && ema1h[latestIndex] > latest4h;
      const crossedDown = ema1h[prevIndex] >= prev4h && ema1h[latestIndex] < latest4h;
      const latestClose1h = rows1h[latestIndex].close;
      const emaDistancePct = Math.abs(ema1h[latestIndex] - latest4h) / latest4h * 100;
      if (!crossedUp && !crossedDown) {
        return {
          ema1h7: ema1h[latestIndex],
          ema4h7: latest4h,
          emaSignal: null,
          emaSignalLabel: "無交叉",
          emaSignalSide: "",
          emaTs: rows1h[latestIndex].closeTime,
          emaDistancePct,
          priceConfirm: false,
          latestClose1h,
        };
      }

      const signal = crossedUp ? "long" : "short";
      const priceConfirm = signal === "long" ? latestClose1h > latest4h : latestClose1h < latest4h;
      return {
        ema1h7: ema1h[latestIndex],
        ema4h7: latest4h,
        emaSignal: signal,
        emaSignalLabel: signal === "long" ? "1H 上穿 4H" : "1H 下穿 4H",
        emaSignalSide: signal === "long" ? "多" : "空",
        emaTs: rows1h[latestIndex].closeTime,
        emaDistancePct,
        priceConfirm,
        latestClose1h,
      };
    }

    function oiStrengthLabel(chg, p90, p95) {
      if (Number.isFinite(p95) && chg >= p95) return "爆量增倉";
      if (Number.isFinite(p90) && chg >= p90) return "強增倉";
      return "普通增倉";
    }

    function oiStrengthClass(label) {
      if (label === "爆量增倉") return "strong";
      if (label === "強增倉") return "watch";
      return "";
    }

    async function analyzeSymbol(symbol, period, limit) {
      const oiRows = await getOiRows(symbol, period, limit);
      if (!oiRows) throw new Error("OI 資料不足");

      const changes = [];
      for (let i = 1; i < oiRows.length; i += 1) {
        const chg = pctChange(oiRows[i].oi, oiRows[i - 1].oi);
        if (Number.isFinite(chg)) {
          changes.push({ ...oiRows[i], chg });
        }
      }
      if (changes.length < 20) throw new Error("OI 變化資料不足");

      const latest = changes[changes.length - 1];
      const history = changes.length >= 50 ? changes.slice(0, -1) : changes;
      const vals = history.map((row) => row.chg);
      const p90 = percentile(vals.map(Math.abs), 0.9);
      const p95 = percentile(vals.map(Math.abs), 0.95);
      const latestAbs = Math.abs(latest.chg);
      let level = "-";
      if (Number.isFinite(p95) && latestAbs >= p95) level = "強異常";
      else if (Number.isFinite(p90) && latestAbs >= p90) level = "注意";

      const emaSignal = await analyzeEmaCross(symbol, limit);
      const emaDistanceOk = Number.isFinite(emaSignal.emaDistancePct) && emaSignal.emaDistancePct >= EMA_DIFF_MIN;
      const oiStrength = oiStrengthLabel(latest.chg, p90, p95);

      return {
        symbol,
        ts: latest.ts,
        oi: latest.oi,
        chg: latest.chg,
        direction: latest.chg > 0 ? "增倉" : "減倉",
        oiConfirm: latest.chg > 0 && Boolean(emaSignal.emaSignal) && emaDistanceOk && emaSignal.priceConfirm,
        level,
        oiStrength,
        emaDistanceOk,
        p90,
        p95,
        ...emaSignal,
      };
    }

    async function mapLimit(items, limit, mapper, onProgress) {
      const results = [];
      let index = 0;
      let done = 0;
      async function worker() {
        while (index < items.length) {
          const item = items[index];
          index += 1;
          try {
            results.push(await mapper(item));
          } catch (error) {
            results.push({ symbol: item, error: error.message || "抓取失敗" });
          }
          done += 1;
          onProgress(done, items.length);
        }
      }
      await Promise.all(Array.from({ length: Math.min(limit, items.length) }, worker));
      return results;
    }

    function classifyCard(row) {
      if (row.emaSignal === "long" && row.oiConfirm) return "signal-long";
      if (row.emaSignal === "short" && row.oiConfirm) return "signal-short";
      if (row.level === "強異常") return "strong";
      if (row.level === "注意") return "watch";
      return "normal";
    }

    function badgeClass(level) {
      if (level === "強異常") return "strong";
      if (level === "注意") return "watch";
      return "";
    }

    function signedClass(value) {
      if (!Number.isFinite(value)) return "";
      return value >= 0 ? "positive" : "negative";
    }

    function renderCards() {
      const valid = lastRows.filter((row) => !row.error);
      const hits = valid.filter((row) => row.oiConfirm);
      const rows = hits;
      els.resultTitle.textContent = "最新 OI 增倉 + EMA 跨週期交叉";
      els.resultSubtitle.textContent = `${hits.length} 個命中 / ${valid.length} 個有效結果`;

      if (!rows.length) {
        els.cards.innerHTML = `<div class="panel empty">目前沒有 OI 增倉訊號</div>`;
        return;
      }

      els.cards.innerHTML = rows.map((row) => {
        const emaClass = row.emaSignal === "long" ? "long" : row.emaSignal === "short" ? "short" : "";
        const signalTextClass = row.emaSignal === "long" ? "long-text" : row.emaSignal === "short" ? "short-text" : "";
        return `
          <article class="panel coin-card ${classifyCard(row)}">
            <div class="coin-head">
              <div>
                <div class="symbol">${row.symbol}</div>
                <div class="time">${fmtTime(row.ts)}</div>
              </div>
              <div class="badges">
                <span class="badge ${emaClass}">${row.emaSignalLabel}</span>
                <span class="badge ${row.oiConfirm ? "long" : ""}">${row.oiConfirm ? "OI 增倉" : "OI 未確認"}</span>
                <span class="badge ${oiStrengthClass(row.oiStrength)}">${row.oiStrength}</span>
                <span class="badge ${row.priceConfirm ? emaClass : ""}">價格同向</span>
              </div>
            </div>
            <div class="coin-body">
              <div class="primary-metric">
                <div>
                  <span>1H EMA7 / 4H EMA7</span>
                  <strong class="${signalTextClass}">${row.emaSignalSide || "--"}</strong>
                </div>
                <em>${row.emaSignalLabel} / ${fmtTime(row.emaTs)}</em>
              </div>
              <div>
                <div class="mini-grid">
                  <div class="mini-cell"><span>OI 變化</span><strong class="value-oi ${signedClass(row.chg)}">${fmtPct(row.chg)}</strong></div>
                  <div class="mini-cell"><span>OI 強弱</span><strong class="value-strength">${row.oiStrength}</strong></div>
                  <div class="mini-cell"><span>EMA 距離</span><strong class="value-distance">${fmtPct(row.emaDistancePct)}</strong></div>
                  <div class="mini-cell"><span>價格確認</span><strong class="value-price">${row.priceConfirm ? "同方向" : "未確認"}</strong></div>
                  <div class="mini-cell"><span>P90 / P95</span><strong class="value-threshold">${fmtPct(row.p90)} / ${fmtPct(row.p95)}</strong></div>
                  <div class="mini-cell"><span>更新時間</span><strong class="value-time">${fmtTime(row.ts)}</strong></div>
                </div>
              </div>
            </div>
          </article>
        `;
      }).join("");
    }

    function updateMetrics(rows) {
      const valid = rows.filter((row) => !row.error);
      els.metricTotal.textContent = String(valid.length);
      els.metricStrong.textContent = String(valid.filter((row) => row.emaSignal).length);
      els.metricWatch.textContent = String(valid.filter((row) => row.oiConfirm).length);
      els.metricTime.textContent = new Intl.DateTimeFormat("zh-TW", {
        hour: "2-digit",
        minute: "2-digit",
        hour12: false,
      }).format(new Date());
    }

    function setProgress(done, total) {
      els.progressWrap.hidden = false;
      els.progressLabel.textContent = `${done} / ${total}`;
      els.progressBar.style.width = total ? `${Math.round((done / total) * 100)}%` : "0";
    }

    async function runScan() {
      els.scan.disabled = true;
      els.scan.textContent = "掃描中";
      els.statusText.textContent = "抓取 Binance";
      els.statusDot.classList.remove("live");
      els.log.textContent = "正在建立幣種清單";
      els.cards.innerHTML = "";
      setProgress(0, 0);

      try {
        const symbols = await fetchLiquiditySymbols();
        if (!symbols.length) throw new Error("沒有符合成交額條件的幣種");

        els.log.textContent = `掃描 ${symbols.length} 個幣種`;
        const results = await mapLimit(
          symbols,
          6,
          (symbol) => analyzeSymbol(symbol, FIXED_PERIOD, FIXED_LIMIT),
          setProgress
        );
        lastRows = results
          .filter((row) => !row.error)
          .sort((a, b) => signalPriority(a) - signalPriority(b) || levelPriority(a.level) - levelPriority(b.level) || Math.abs(b.chg) - Math.abs(a.chg) || a.symbol.localeCompare(b.symbol));
        const errors = results.filter((row) => row.error);
        updateMetrics(lastRows);
        renderCards();
        els.statusText.textContent = "已更新";
        els.statusDot.classList.add("live");
        els.log.textContent = errors.length ? `完成，${errors.length} 個幣種抓取失敗或資料不足` : "完成";
      } catch (error) {
        els.statusText.textContent = "掃描失敗";
        els.log.textContent = error.message || "抓取失敗";
        els.cards.innerHTML = `<div class="panel empty">掃描失敗</div>`;
      } finally {
        els.scan.disabled = false;
        els.scan.textContent = "開始掃描";
        els.progressWrap.hidden = true;
      }
    }

    els.scan.addEventListener("click", runScan);
  </script>
</body>
</html>
