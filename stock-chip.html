<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>個股籌碼查詢</title>
  <style>
    :root {
      --bg: #f6f7f4;
      --panel: #fff;
      --ink: #1f2520;
      --muted: #667266;
      --line: #dfe4dc;
      --green: #13795b;
      --red: #b42318;
      --blue: #1f5f8b;
      --amber: #9a5b05;
      --soft-green: #e8f5ef;
      --soft-red: #fff0ed;
      --soft-blue: #eaf3fb;
      --soft-amber: #fff5df;
      --shadow: 0 12px 26px rgba(31, 37, 32, 0.08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background:
        linear-gradient(180deg, rgba(234, 243, 251, 0.9), rgba(246, 247, 244, 0.7) 300px),
        var(--bg);
      color: var(--ink);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans TC", sans-serif;
      line-height: 1.5;
    }

    button, input { font: inherit; }

    .app {
      width: min(1120px, calc(100% - 28px));
      margin: 0 auto;
      padding: 22px 0 44px;
    }

    body.locked .app {
      display: none;
    }

    .gate {
      min-height: 100vh;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 22px;
    }

    body.locked .gate {
      display: flex;
    }

    .gate-card {
      width: min(420px, 100%);
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
      padding: 18px;
    }

    .gate-card h1 {
      margin: 0 0 6px;
      font-size: 28px;
    }

    .gate-card p {
      margin: 0 0 16px;
      color: var(--muted);
      font-size: 14px;
    }

    .gate-card label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .gate-card input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 11px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    .gate-card input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 95, 139, 0.14);
    }

    .gate-card button {
      width: 100%;
      min-height: 44px;
      margin-top: 12px;
      border: 0;
      border-radius: 6px;
      background: var(--ink);
      color: #fff;
      font-weight: 850;
      cursor: pointer;
    }

    .gate-error {
      min-height: 20px;
      margin-top: 10px;
      color: var(--red);
      font-size: 13px;
      font-weight: 750;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      margin-bottom: 18px;
    }

    h1 {
      margin: 0;
      font-size: clamp(24px, 5vw, 38px);
      letter-spacing: 0;
    }

    .subline {
      color: var(--muted);
      font-size: 14px;
      margin-top: 3px;
    }

    .nav {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .nav a {
      color: var(--blue);
      text-decoration: none;
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.78);
      border-radius: 999px;
      min-height: 34px;
      display: inline-flex;
      align-items: center;
      padding: 0 12px;
      font-size: 13px;
      font-weight: 750;
    }

    .layout {
      display: grid;
      grid-template-columns: 330px minmax(0, 1fr);
      gap: 16px;
      align-items: start;
    }

    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: var(--shadow);
    }

    .controls {
      padding: 16px;
      position: sticky;
      top: 14px;
    }

    .field { margin-bottom: 14px; }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    input {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px 11px;
      color: var(--ink);
      background: #fff;
      outline: none;
    }

    input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(31, 95, 139, 0.14);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .grid-2.is-single {
      grid-template-columns: 1fr;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }

    .primary, .secondary {
      min-height: 44px;
      border-radius: 6px;
      padding: 0 14px;
      cursor: pointer;
      font-weight: 800;
      border: 0;
      color: #fff;
      transition: filter 0.16s ease, transform 0.16s ease;
    }

    .primary {
      background: var(--blue);
    }

    .secondary {
      background: var(--ink);
    }

    .action-query { background: var(--blue); }
    .action-rank { background: var(--amber); }
    .action-strong { background: var(--green); }

    .primary.is-active,
    .secondary.is-active {
      box-shadow: 0 0 0 3px rgba(31, 37, 32, 0.13);
      filter: brightness(0.95);
    }

    .mode-form {
      display: none;
      border-top: 1px solid var(--line);
      padding-top: 14px;
    }

    .mode-form.is-open {
      display: block;
    }

    .mode-title {
      margin: 0 0 12px;
      font-size: 15px;
      font-weight: 850;
    }

    .field.is-hidden {
      display: none;
    }

    .execute-button {
      width: 100%;
      margin-top: 2px;
    }

    .primary:hover:not(:disabled),
    .secondary:hover:not(:disabled) {
      filter: brightness(0.94);
      transform: translateY(-1px);
    }

    .primary:disabled,
    .secondary:disabled {
      opacity: 0.72;
      cursor: progress;
    }

    .status {
      padding: 12px 14px;
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 12px;
      min-height: 44px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }

    .metric {
      min-height: 92px;
      padding: 14px;
    }

    .metric span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric strong {
      display: block;
      margin-top: 6px;
      font-size: 24px;
      overflow-wrap: anywhere;
    }

    .positive { color: var(--green); }
    .negative { color: var(--red); }
    .neutral { color: var(--muted); }

    .card {
      padding: 15px;
      margin-bottom: 12px;
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 12px;
      margin-bottom: 12px;
    }

    .card-title {
      font-size: 18px;
      font-weight: 850;
    }

    .card-sub {
      color: var(--muted);
      font-size: 12px;
      margin-top: 2px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 10px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }

    .badge.good {
      color: var(--green);
      border-color: #9ed9c7;
      background: var(--soft-green);
    }

    .badge.bad {
      color: var(--red);
      border-color: #f4b8b0;
      background: var(--soft-red);
    }

    .data-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
    }

    .cell {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255,255,255,0.78);
      padding: 10px;
      min-height: 70px;
    }

    .cell span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .cell strong {
      display: block;
      font-size: 16px;
      overflow-wrap: anywhere;
    }

    .signal {
      border-left: 5px solid var(--blue);
      background: linear-gradient(90deg, var(--soft-blue), #fff 36%);
    }

    .signal.good {
      border-left-color: var(--green);
      background: linear-gradient(90deg, var(--soft-green), #fff 36%);
    }

    .signal.bad {
      border-left-color: var(--red);
      background: linear-gradient(90deg, var(--soft-red), #fff 36%);
    }

    .context-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
      margin-top: 12px;
    }

    .context-box {
      border: 1px solid var(--line);
      border-radius: 6px;
      background: rgba(255,255,255,0.78);
      padding: 11px;
    }

    .context-box span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    .context-box strong {
      display: block;
      font-size: 15px;
      margin-bottom: 4px;
    }

    .context-box p {
      margin: 0;
      color: var(--muted);
      font-size: 13px;
    }

    .ranking {
      display: grid;
      gap: 8px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 54px 1fr auto;
      gap: 10px;
      align-items: center;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 10px;
      background: #fff;
    }

    .rank-row.strong-detail {
      grid-template-columns: 54px minmax(0, 1fr);
      align-items: start;
    }

    .rank-no {
      color: var(--muted);
      font-size: 12px;
      font-weight: 850;
    }

    .rank-main strong,
    .rank-side strong {
      display: block;
    }

    .rank-main span,
    .rank-side span {
      color: var(--muted);
      font-size: 12px;
    }

    .strong-grid {
      margin-top: 10px;
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 8px;
    }

    .strong-cell {
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 8px 9px;
      background: rgba(246, 247, 244, 0.74);
      min-height: 58px;
    }

    .strong-cell > span {
      display: block;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      margin-bottom: 3px;
    }

    .strong-cell strong {
      display: block;
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .strong-split {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .strong-split b {
      font-size: 14px;
    }

    .strong-cell.chain-cell {
      grid-column: span 2;
    }

    .chain-list {
      display: grid;
      gap: 4px;
      color: var(--ink);
      font-size: 12px;
      line-height: 1.35;
    }

    .chain-list b {
      color: var(--muted);
      font-size: 11px;
      margin-right: 4px;
    }

    .chain-list .missing {
      color: var(--muted);
      font-weight: 850;
    }

    .empty {
      text-align: center;
      padding: 36px 18px;
      color: var(--muted);
    }

    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      .controls { position: static; }
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .data-grid, .strong-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }

    @media (max-width: 560px) {
      .app { width: min(100% - 20px, 1120px); padding-top: 14px; }
      .topbar, .card-head { flex-direction: column; align-items: stretch; }
      .nav { justify-content: flex-start; }
      .grid-2, .actions, .summary, .data-grid, .context-grid, .strong-grid { grid-template-columns: 1fr; }
      .rank-row { grid-template-columns: 42px 1fr; }
      .rank-side { grid-column: 2; }
    }
  </style>
</head>
<body class="locked">
  <section class="gate" aria-label="密碼保護">
    <form class="gate-card" id="gateForm">
      <h1>個股籌碼查詢</h1>
      <p>輸入密碼後進入工具。</p>
      <label for="passwordInput">Password</label>
      <input id="passwordInput" type="password" autocomplete="current-password" inputmode="text">
      <button type="submit">進入</button>
      <div class="gate-error" id="gateError"></div>
    </form>
  </section>

  <main class="app">
    <header class="topbar">
      <div>
        <h1>個股籌碼查詢</h1>
        <div class="subline">TWSE 上市股票</div>
      </div>
      <nav class="nav">
        <a href="./index.html">工具首頁</a>
        <a href="./oi.html">OI 掃描</a>
      </nav>
    </header>

    <section class="layout">
      <aside class="panel controls">
        <div class="actions">
          <button id="queryButton" class="primary action-query">查個股</button>
          <button id="rankButton" class="secondary action-rank">互抵排行</button>
          <button id="strongButton" class="secondary action-strong">強勢股</button>
        </div>
        <div id="modeForm" class="mode-form">
          <div id="modeTitle" class="mode-title">選擇功能</div>
          <div id="stockField" class="field">
            <label for="stockInput">股票代號</label>
            <input id="stockInput" inputmode="numeric" placeholder="例如 2330" value="2330">
          </div>
          <div id="fieldsGrid" class="grid-2">
            <div id="dateField" class="field">
              <label for="dateInput">查詢日期</label>
              <input id="dateInput" inputmode="numeric" placeholder="YYYYMMDD">
            </div>
            <div id="rankField" class="field">
              <label for="rankInput">排行筆數</label>
              <input id="rankInput" type="number" min="3" max="30" value="10">
            </div>
          </div>
          <button id="executeButton" class="primary execute-button">開始查詢</button>
        </div>
      </aside>

      <section>
        <div class="summary">
          <div class="panel metric">
            <span>法人日期</span>
            <strong id="instDate">--</strong>
          </div>
          <div class="panel metric">
            <span>資券日期</span>
            <strong id="marginDate">--</strong>
          </div>
          <div class="panel metric">
            <span>法人合計</span>
            <strong id="instTotal">--</strong>
          </div>
          <div class="panel metric">
            <span>融資變化</span>
            <strong id="marginChange">--</strong>
          </div>
        </div>

        <div class="panel status" id="statusText">輸入股票代號後查詢。</div>
        <div id="result"></div>
      </section>
    </section>
  </main>

  <script>
    const PASSWORD_HASH = "c1f330d0aff31c1c87403f1e4347bcc21aff7c179908723535f2b31723702525";
    const SESSION_KEY = "marketToolsUnlocked";
    const gateForm = document.getElementById("gateForm");
    const passwordInput = document.getElementById("passwordInput");
    const gateError = document.getElementById("gateError");

    async function sha256(text) {
      const bytes = new TextEncoder().encode(text);
      const digest = await crypto.subtle.digest("SHA-256", bytes);
      return [...new Uint8Array(digest)].map((b) => b.toString(16).padStart(2, "0")).join("");
    }

    function unlock() {
      document.body.classList.remove("locked");
      sessionStorage.setItem(SESSION_KEY, "1");
    }

    if (sessionStorage.getItem(SESSION_KEY) === "1") {
      unlock();
    } else {
      passwordInput.focus();
    }

    gateForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      gateError.textContent = "";
      const hash = await sha256(passwordInput.value);
      if (hash === PASSWORD_HASH) {
        unlock();
        passwordInput.value = "";
      } else {
        gateError.textContent = "密碼錯誤";
        passwordInput.select();
      }
    });

    const INST_API = "https://www.twse.com.tw/rwd/zh/fund/T86";
    const MARGIN_API = "https://www.twse.com.tw/rwd/zh/marginTrading/MI_MARGN";
    // 財報/營收的抓取與「訊號判斷邏輯」放在 Cloudflare Worker（伺服器端），
    // 前端只送股號、拿回算好的 growth 結果。部署後把網址換成你的 Worker。
    const GROWTH_API = "https://stock-growth.goodely.workers.dev/api/stock";
    const CONTEXT_DB_URL = "./stock-context-db.json";
    let stockContexts = {};
    let activeMode = "";

    const els = {
      stock: document.getElementById("stockInput"),
      date: document.getElementById("dateInput"),
      rank: document.getElementById("rankInput"),
      query: document.getElementById("queryButton"),
      rankButton: document.getElementById("rankButton"),
      strongButton: document.getElementById("strongButton"),
      modeForm: document.getElementById("modeForm"),
      modeTitle: document.getElementById("modeTitle"),
      fieldsGrid: document.getElementById("fieldsGrid"),
      stockField: document.getElementById("stockField"),
      dateField: document.getElementById("dateField"),
      rankField: document.getElementById("rankField"),
      execute: document.getElementById("executeButton"),
      status: document.getElementById("statusText"),
      result: document.getElementById("result"),
      instDate: document.getElementById("instDate"),
      marginDate: document.getElementById("marginDate"),
      instTotal: document.getElementById("instTotal"),
      marginChange: document.getElementById("marginChange"),
    };

    const modeConfig = {
      query: {
        title: "查個股",
        action: "查詢個股",
        showStock: true,
        showRank: false,
        status: "輸入股票代號與日期後查詢。",
      },
      rank: {
        title: "互抵排行",
        action: "查詢互抵排行",
        showStock: false,
        showRank: true,
        status: "選擇日期與排行筆數後查詢。",
      },
      strong: {
        title: "強勢股",
        action: "篩選強勢股",
        showStock: false,
        showRank: true,
        status: "選擇日期與顯示筆數後篩選。",
      },
    };

    function setActiveMode(mode) {
      activeMode = mode;
      const config = modeConfig[mode];
      if (!config) return;
      els.modeForm.classList.add("is-open");
      els.modeTitle.textContent = config.title;
      els.execute.textContent = config.action;
      els.stockField.classList.toggle("is-hidden", !config.showStock);
      els.rankField.classList.toggle("is-hidden", !config.showRank);
      els.fieldsGrid.classList.toggle("is-single", !config.showRank);
      els.query.classList.toggle("is-active", mode === "query");
      els.rankButton.classList.toggle("is-active", mode === "rank");
      els.strongButton.classList.toggle("is-active", mode === "strong");
      els.status.textContent = config.status;
      if (config.showStock) {
        els.stock.focus();
      } else {
        els.date.focus();
      }
    }

    async function executeActiveMode() {
      if (activeMode === "query") {
        await queryStock();
      } else if (activeMode === "rank") {
        await showRanking();
      } else if (activeMode === "strong") {
        await showStrongChips();
      } else {
        els.status.textContent = "請先選擇功能。";
      }
    }

    let lastInst = null;
    let lastMargin = null;
    const financialCache = new Map();

    function todayYmd() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}${m}${day}`;
    }

    function addDays(ymd, delta) {
      const d = new Date(Number(ymd.slice(0, 4)), Number(ymd.slice(4, 6)) - 1, Number(ymd.slice(6, 8)));
      d.setDate(d.getDate() + delta);
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}${m}${day}`;
    }

    function toNum(value) {
      const n = Number(String(value ?? "").replace(/,/g, "").trim());
      return Number.isFinite(n) ? n : 0;
    }

    function fmtNum(value) {
      if (!Number.isFinite(value)) return "--";
      return new Intl.NumberFormat("zh-TW").format(Math.round(value));
    }

    function fmtPct(value) {
      return Number.isFinite(value) ? `${value.toFixed(2)}%` : "--";
    }

    function signedClass(value) {
      if (!Number.isFinite(value) || value === 0) return "neutral";
      return value > 0 ? "positive" : "negative";
    }

    function signed(value) {
      if (!Number.isFinite(value)) return "--";
      return `${value > 0 ? "+" : ""}${fmtNum(value)}`;
    }

    function signedPct(value) {
      if (!Number.isFinite(value)) return "--";
      return `${value > 0 ? "+" : ""}${value.toFixed(2)}%`;
    }

    function signedPoint(value) {
      if (!Number.isFinite(value)) return "--";
      return `${value > 0 ? "+" : ""}${value.toFixed(2)}pt`;
    }

    function fmtEps(value) {
      return Number.isFinite(value) ? value.toFixed(2) : "查無公開資料";
    }

    function defaultContext(name, code) {
      return {
        industry: "未建檔",
        role: `${name || code} 尚未建立產業脈絡資料`,
        upstream: "可補：主要原料、零組件、關鍵設備或服務供應商",
        downstream: "可補：主要客戶、終端市場、應用產品",
        partners: "可補：策略合作、集團關係、主要客戶或供應鏈生態系",
      };
    }

    async function loadStockContexts() {
      if (Object.keys(stockContexts).length) return stockContexts;
      try {
        const response = await fetch(CONTEXT_DB_URL, { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const data = await response.json();
        stockContexts = data && typeof data === "object" ? data : {};
      } catch (error) {
        stockContexts = {};
      }
      return stockContexts;
    }

    function contextFor(code, name) {
      return stockContexts[code] || defaultContext(name, code);
    }

    function renderIndustryChain(code, name) {
      const context = stockContexts[code];
      if (!context) return `<span class="missing">產業鏈待補</span>`;
      return `
        <span><b>產業</b>${context.industry || "產業鏈待補"}</span>
        <span><b>上游</b>${context.upstream || "產業鏈待補"}</span>
        <span><b>下游</b>${context.downstream || "產業鏈待補"}</span>
      `;
    }

    function renderContextCard(code, name) {
      const context = contextFor(code, name);
      return `
        <article class="panel card">
          <div class="card-head">
            <div>
              <div class="card-title">產業脈絡</div>
              <div class="card-sub">${code} ${name || ""}</div>
            </div>
            <span class="badge ${stockContexts[code] ? "good" : ""}">${context.industry}</span>
          </div>
          <div class="context-grid">
            <div class="context-box">
              <span>定位</span>
              <strong>${context.role}</strong>
              <p>用來快速判斷這檔股票的資金故事屬於哪一條供應鏈。</p>
            </div>
            <div class="context-box">
              <span>上下游</span>
              <strong>上游</strong>
              <p>${context.upstream}</p>
              <strong style="margin-top:8px;">下游</strong>
              <p>${context.downstream}</p>
            </div>
            <div class="context-box">
              <span>合作 / 生態系</span>
              <p>${context.partners}</p>
            </div>
          </div>
        </article>
      `;
    }

    async function fetchJson(url, params) {
      const query = new URLSearchParams(params);
      const response = await fetch(`${url}?${query}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    }

    function normalizeInst(data) {
      if (!data || data.stat !== "OK" || !Array.isArray(data.fields) || !Array.isArray(data.data)) return null;
      const fields = data.fields;
      const idx = Object.fromEntries(fields.map((field, i) => [field, i]));
      const rows = data.data
        .filter((row) => String(row[idx["證券代號"]] || "").trim().match(/^\d{4}$/))
        .map((row) => ({
          code: String(row[idx["證券代號"]]).trim(),
          name: String(row[idx["證券名稱"]]).trim(),
          foreign: toNum(row[idx["外陸資買賣超股數(不含外資自營商)"]]),
          trust: toNum(row[idx["投信買賣超股數"]]),
          dealer: toNum(row[idx["自營商買賣超股數"]]),
          total: toNum(row[idx["三大法人買賣超股數"]]),
        }));
      return { date: data.date, rows };
    }

    function normalizeMargin(data) {
      if (!data || data.stat !== "OK" || !Array.isArray(data.tables) || data.tables.length < 2) return null;
      const table = data.tables[1];
      if (!Array.isArray(table.data)) return null;
      const rows = table.data
        .filter((row) => String(row[0] || "").trim().match(/^\d{4}$/))
        .map((row) => {
          const marginPrev = toNum(row[5]);
          const marginNow = toNum(row[6]);
          const shortPrev = toNum(row[11]);
          const shortNow = toNum(row[12]);
          const limit = toNum(row[7]);
          return {
            code: String(row[0]).trim(),
            name: String(row[1]).trim(),
            marginNow,
            marginChange: marginNow - marginPrev,
            shortNow,
            shortChange: shortNow - shortPrev,
            offset: toNum(row[14]),
            marginLimit: limit,
            marginUse: marginNow > 0 && limit > 0 ? marginNow / limit * 100 : null,
          };
        });
      return { date: data.date, rows };
    }

    async function fetchWithFallback(kind, ymd) {
      for (let i = 0; i <= 7; i += 1) {
        const date = addDays(ymd, -i);
        const data = kind === "inst"
          ? await fetchJson(INST_API, { response: "json", date, selectType: "ALL" })
          : await fetchJson(MARGIN_API, { response: "json", date, selectType: "ALL" });
        const normalized = kind === "inst" ? normalizeInst(data) : normalizeMargin(data);
        if (normalized && normalized.rows.length) return normalized;
        await new Promise((resolve) => setTimeout(resolve, 260));
      }
      return null;
    }

    async function fetchInstitutionalDay(date) {
      const data = await fetchJson(INST_API, { response: "json", date, selectType: "ALL" });
      return normalizeInst(data);
    }

    async function fetchRecentInstitutionalDays(count, endYmd) {
      const days = [];
      let date = endYmd;
      for (let i = 0; i < 60 && days.length < count; i += 1) {
        try {
          const normalized = await fetchInstitutionalDay(date);
          if (normalized && normalized.rows.length) days.push(normalized);
        } catch (error) {
          // Skip holidays or unavailable dates.
        }
        date = addDays(date, -1);
        await new Promise((resolve) => setTimeout(resolve, 260));
      }
      return days.reverse();
    }

    // 訊號判斷邏輯已搬到 Cloudflare Worker；前端只送股號、拿回算好的 growth。
    // Worker 回傳形狀與 renderGrowthCard 需要的物件一致。
    async function fetchGrowthData(code) {
      if (financialCache.has(code)) return financialCache.get(code);
      const data = await fetchJson(GROWTH_API, { code });
      const growth = data && data.growth ? data.growth : null;
      financialCache.set(code, growth);
      return growth;
    }

    async function fetchGrowthDataSafe(code, timeoutMs = 5500) {
      if (financialCache.has(code)) return financialCache.get(code);
      try {
        const timeout = new Promise((resolve) => {
          setTimeout(() => resolve(null), timeoutMs);
        });
        const growth = await Promise.race([fetchGrowthData(code), timeout]);
        if (!financialCache.has(code)) financialCache.set(code, growth || null);
        return growth || null;
      } catch (error) {
        financialCache.set(code, null);
        return null;
      }
    }

    function renderGrowthCard(growth) {
      if (!growth) {
        return `
          <article class="panel card">
            <div class="card-head">
              <div>
                <div class="card-title">成長能力</div>
                <div class="card-sub">TWSE 財報資料</div>
              </div>
              <span class="badge">查無公開資料</span>
            </div>
            <div class="empty">目前無法取得這檔股票的公開財報資料</div>
          </article>
        `;
      }

      const latest = growth.latest || {};
      const hasFinancial = Boolean(growth.latest);
      const period = latest.year && latest.quarter ? `${latest.year}Q${latest.quarter}` : "最新一季";
      const revenueTrend = growth.revenueTrend || null;
      const revenueSignal = revenueTrend?.signal || null;
      const hasRevenueYoy = Number.isFinite(revenueTrend?.latest?.yoy);
      return `
        <article class="panel card">
          <div class="card-head">
            <div>
              <div class="card-title">成長能力</div>
              <div class="card-sub">${hasFinancial ? `${period} 損益表` : "查無公開財報"} / 營收 YoY 由月營收資料判斷</div>
            </div>
            <span class="badge ${growth.hasHistory ? "good" : ""}">${growth.hasHistory ? "含歷史比較" : hasFinancial ? "最新季" : "查無公開資料"}</span>
          </div>
          <div class="data-grid">
            <div class="cell">
              <span>毛利率</span>
              <strong class="${signedClass(latest.grossMargin)}">${Number.isFinite(latest.grossMargin) ? fmtPct(latest.grossMargin) : "查無公開資料"}</strong>
            </div>
            <div class="cell">
              <span>毛利率 QoQ</span>
              <strong class="${signedClass(growth.grossQoq)}">${Number.isFinite(growth.grossQoq) ? signedPoint(growth.grossQoq) : "查無公開資料"}</strong>
            </div>
            <div class="cell">
              <span>近3月營收 YoY</span>
              <strong class="${signedClass(revenueTrend?.latest?.yoy)}">${hasRevenueYoy ? revenueTrend.label : "缺資待補"}</strong>
            </div>
            <div class="cell">
              <span>營收訊號</span>
              <strong class="${hasRevenueYoy && revenueSignal?.tone === "bad" ? "negative" : hasRevenueYoy && revenueSignal?.tone === "good" ? "positive" : "neutral"}">${hasRevenueYoy ? revenueSignal?.text || "缺資待補" : "缺資待補"}</strong>
              <span>${hasRevenueYoy ? revenueSignal?.detail || "" : ""}</span>
            </div>
            <div class="cell">
              <span>EPS</span>
              <strong class="${signedClass(latest.eps)}">${fmtEps(latest.eps)}</strong>
            </div>
            <div class="cell">
              <span>EPS 季增</span>
              <strong class="${signedClass(growth.epsQoq)}">${Number.isFinite(growth.epsQoq) ? signedPct(growth.epsQoq) : "查無公開資料"}</strong>
            </div>
            <div class="cell">
              <span>EPS 年增</span>
              <strong class="${signedClass(growth.epsYoy)}">${Number.isFinite(growth.epsYoy) ? signedPct(growth.epsYoy) : "查無公開資料"}</strong>
            </div>
            <div class="cell">
              <span>營收</span>
              <strong>${Number.isFinite(latest.revenue) ? fmtNum(latest.revenue) : "查無公開資料"}</strong>
            </div>
          </div>
        </article>
      `;
    }

    function signalFor(inst, margin) {
      if (!inst || !margin) return { text: "資料不足，無法判斷", tone: "" };
      const total = inst.total;
      const marginChange = margin.marginChange;
      const shortChange = margin.shortChange;
      if (total > 0 && marginChange > 0) return { text: "法人買超 + 融資增加 -> 散戶跟進，偏多", tone: "good" };
      if (total > 0 && shortChange > 0) return { text: "法人買超 + 融券增加 -> 有人放空對賭，留意軋空", tone: "good" };
      if (total < 0 && marginChange > 0) return { text: "法人賣超 + 融資增加 -> 散戶接刀，偏空警示", tone: "bad" };
      if (total < 0 && shortChange > 0) return { text: "法人賣超 + 融券增加 -> 多空皆跑，偏空", tone: "bad" };
      if (total > 0 && marginChange < 0) return { text: "法人買超 + 融資減少 -> 散戶獲利了結，法人獨撐", tone: "good" };
      if (total < 0 && shortChange < 0) return { text: "法人賣超 + 融券回補 -> 空方獲利了結，可能止跌", tone: "" };
      return { text: `法人${total > 0 ? "買超" : "賣超"}，融資${marginChange > 0 ? "增加" : "減少"}，融券${shortChange > 0 ? "增加" : "減少"}`, tone: "" };
    }

    function setMetrics(inst, margin) {
      els.instDate.textContent = lastInst?.date || "--";
      els.marginDate.textContent = lastMargin?.date || "--";
      els.instTotal.textContent = inst ? signed(inst.total) : "--";
      els.instTotal.className = inst ? signedClass(inst.total) : "";
      els.marginChange.textContent = margin ? signed(margin.marginChange) : "--";
      els.marginChange.className = margin ? signedClass(margin.marginChange) : "";
    }

    function renderStock(inst, margin, code, growth) {
      const name = inst?.name || margin?.name || code;
      const signal = signalFor(inst, margin);
      els.result.innerHTML = `
        <article class="panel card">
          <div class="card-head">
            <div>
              <div class="card-title">${code} ${name}</div>
              <div class="card-sub">法人 ${lastInst?.date || "--"} / 資券 ${lastMargin?.date || "--"}</div>
            </div>
            <span class="badge ${signal.tone === "bad" ? "bad" : signal.tone === "good" ? "good" : ""}">${inst?.total >= 0 ? "法人買超" : "法人賣超"}</span>
          </div>
          <div class="data-grid">
            <div class="cell"><span>外資</span><strong class="${signedClass(inst?.foreign)}">${inst ? signed(inst.foreign) : "--"}</strong></div>
            <div class="cell"><span>投信</span><strong class="${signedClass(inst?.trust)}">${inst ? signed(inst.trust) : "--"}</strong></div>
            <div class="cell"><span>自營商</span><strong class="${signedClass(inst?.dealer)}">${inst ? signed(inst.dealer) : "--"}</strong></div>
            <div class="cell"><span>三大法人</span><strong class="${signedClass(inst?.total)}">${inst ? signed(inst.total) : "--"}</strong></div>
            <div class="cell"><span>融資餘額</span><strong>${margin ? fmtNum(margin.marginNow) : "--"}</strong></div>
            <div class="cell"><span>融資變化</span><strong class="${signedClass(margin?.marginChange)}">${margin ? signed(margin.marginChange) : "--"}</strong></div>
            <div class="cell"><span>融券餘額</span><strong>${margin ? fmtNum(margin.shortNow) : "--"}</strong></div>
            <div class="cell"><span>融券變化</span><strong class="${signedClass(margin?.shortChange)}">${margin ? signed(margin.shortChange) : "--"}</strong></div>
            <div class="cell"><span>資券互抵</span><strong>${margin ? fmtNum(margin.offset) : "--"}</strong></div>
            <div class="cell"><span>融資使用率</span><strong>${margin ? fmtPct(margin.marginUse) : "--"}</strong></div>
          </div>
        </article>
        ${renderGrowthCard(growth)}
        ${renderContextCard(code, name)}
        <article class="panel card signal ${signal.tone}">
          <div class="card-title">訊號判斷</div>
          <div class="card-sub">${signal.text}</div>
        </article>
      `;
    }

    async function ensureData() {
      const ymd = (els.date.value || todayYmd()).replace(/\D/g, "");
      els.date.value = ymd;
      els.status.textContent = "抓取 TWSE 資料中";
      const [inst, margin] = await Promise.all([
        fetchWithFallback("inst", ymd),
        fetchWithFallback("margin", ymd),
      ]);
      lastInst = inst;
      lastMargin = margin;
      if (!lastInst && !lastMargin) throw new Error("近 7 天查無資料");
    }

    async function queryStock() {
      const code = els.stock.value.trim();
      if (!code.match(/^\d{4}$/)) {
        els.status.textContent = "請輸入 4 碼股票代號";
        return;
      }
      els.query.disabled = true;
      els.execute.disabled = true;
      try {
        await loadStockContexts();
        await ensureData();
        const inst = lastInst?.rows.find((row) => row.code === code) || null;
        const margin = lastMargin?.rows.find((row) => row.code === code) || null;
        const growth = await fetchGrowthDataSafe(code);
        setMetrics(inst, margin);
        renderStock(inst, margin, code, growth);
        els.status.textContent = inst || margin ? "完成" : "查無此股票或非上市普通股";
        localStorage.setItem("stockChipCode", code);
      } catch (error) {
        els.status.textContent = error.message || "查詢失敗";
        els.result.innerHTML = `<div class="panel empty">查詢失敗</div>`;
      } finally {
        els.query.disabled = false;
        els.execute.disabled = false;
      }
    }

    async function showRanking() {
      els.rankButton.disabled = true;
      els.execute.disabled = true;
      try {
        await ensureData();
        const n = Math.max(3, Math.min(30, Number(els.rank.value) || 10));
        const rows = [...(lastMargin?.rows || [])]
          .filter((row) => Number.isFinite(row.offset))
          .sort((a, b) => b.offset - a.offset)
          .slice(0, n);
        setMetrics(null, null);
        els.status.textContent = `完成，資券日期 ${lastMargin?.date || "--"}`;
        els.result.innerHTML = `
          <article class="panel card">
            <div class="card-head">
              <div>
                <div class="card-title">資券互抵前 ${n} 名</div>
                <div class="card-sub">${lastMargin?.date || "--"}</div>
              </div>
            </div>
            <div class="ranking">
              ${rows.map((row, index) => `
                <div class="rank-row">
                  <div class="rank-no">#${index + 1}</div>
                  <div class="rank-main">
                    <strong>${row.code} ${row.name}</strong>
                    <span>融資 ${fmtNum(row.marginNow)} (${signed(row.marginChange)}) / 融券 ${fmtNum(row.shortNow)} (${signed(row.shortChange)})</span>
                  </div>
                  <div class="rank-side">
                    <strong>${fmtNum(row.offset)}</strong>
                    <span>資券互抵</span>
                  </div>
                </div>
              `).join("")}
            </div>
          </article>
        `;
      } catch (error) {
        els.status.textContent = error.message || "查詢失敗";
      } finally {
        els.rankButton.disabled = false;
        els.execute.disabled = false;
      }
    }

    async function showStrongChips() {
      els.strongButton.disabled = true;
      els.execute.disabled = true;
      try {
        await loadStockContexts();
        const ymd = (els.date.value || todayYmd()).replace(/\D/g, "");
        els.date.value = ymd;
        const n = Math.max(3, Math.min(30, Number(els.rank.value) || 10));
        els.status.textContent = "抓取最近 3 個交易日法人資料";

        const days = await fetchRecentInstitutionalDays(3, ymd);
        if (days.length < 3) throw new Error("無法取得足夠交易日資料");

        const latestDate = days[days.length - 1].date;
        els.status.textContent = "比對融資使用率";
        const margin = await fetchWithFallback("margin", latestDate);
        if (!margin || !margin.rows.length) throw new Error("查無資券資料");

        lastInst = days[days.length - 1];
        lastMargin = margin;

        const maps = days.map((day) => new Map(day.rows.map((row) => [row.code, row])));
        const marginMap = new Map(margin.rows.map((row) => [row.code, row]));
        const rows = [];

        for (const latest of days[days.length - 1].rows) {
          const code = latest.code;
          const instRows = maps.map((map) => map.get(code));
          const marginRow = marginMap.get(code);
          if (!instRows.every(Boolean) || !marginRow) continue;
          if (!instRows.every((row) => row.total > 0 && row.foreign > 0)) continue;
          if (!Number.isFinite(marginRow.marginUse) || marginRow.marginUse >= 30) continue;
          rows.push({
            code,
            name: latest.name,
            totals: instRows.map((row) => row.total),
            foreigns: instRows.map((row) => row.foreign),
            trust: latest.trust,
            dealer: latest.dealer,
            latestTotal: latest.total,
            latestForeign: latest.foreign,
          });
        }

        const topRows = rows
          .sort((a, b) => b.latestTotal - a.latestTotal)
          .slice(0, n);

        els.status.textContent = "抓取 EPS 與營收 YoY";
        const enrichedRows = await Promise.all(topRows.map(async (row) => {
          const growth = await fetchGrowthDataSafe(row.code);
          return { ...row, growth };
        }));

        els.instDate.textContent = `${days[0].date}~${latestDate}`;
        els.marginDate.textContent = margin.date || "--";
        els.instTotal.textContent = String(topRows.length);
        els.instTotal.className = "";
        els.marginChange.textContent = "融資<30%";
        els.marginChange.className = "positive";
        els.status.textContent = `完成，符合 ${rows.length} 檔`;

        if (!topRows.length) {
          els.result.innerHTML = `<div class="panel empty">目前無符合條件的強勢股</div>`;
          return;
        }

        els.result.innerHTML = `
          <article class="panel card">
            <div class="card-head">
              <div>
                <div class="card-title">多方強勢股前 ${n} 名</div>
                <div class="card-sub">三大法人連買 3 天 + 外資連買 3 天 + 融資使用率低於 30%</div>
              </div>
              <span class="badge good">${days[0].date}~${latestDate}</span>
            </div>
            <div class="ranking">
              ${enrichedRows.map((row, index) => {
                const latestRevenue = row.growth?.revenueTrend?.latest;
                const revenueSignal = row.growth?.revenueTrend?.signal;
                const signalTone = revenueSignal?.tone === "bad" ? "bad" : revenueSignal?.tone === "good" ? "good" : "";
                return `
                <div class="rank-row strong-detail">
                  <div class="rank-no">#${index + 1}</div>
                  <div class="rank-main">
                    <strong>${row.code} ${row.name}</strong>
                    <div class="strong-grid">
                      <div class="strong-cell">
                        <span>最新三大法人</span>
                        <strong class="${signedClass(row.latestTotal)}">${signed(row.latestTotal)}</strong>
                      </div>
                      <div class="strong-cell">
                        <span>最新外資</span>
                        <strong class="${signedClass(row.latestForeign)}">${signed(row.latestForeign)}</strong>
                      </div>
                      <div class="strong-cell">
                        <span>投信 / 自營商</span>
                        <strong class="strong-split"><b class="${signedClass(row.trust)}">投信 ${signed(row.trust)}</b><b class="${signedClass(row.dealer)}">自營 ${signed(row.dealer)}</b></strong>
                      </div>
                      <div class="strong-cell">
                        <span>最新 EPS</span>
                        <strong class="${signedClass(row.growth?.latest?.eps)}">${fmtEps(row.growth?.latest?.eps)}</strong>
                      </div>
                      <div class="strong-cell">
                        <span>營收 YoY</span>
                        <strong class="${signedClass(latestRevenue?.yoy)}">${Number.isFinite(latestRevenue?.yoy) ? signedPct(latestRevenue.yoy) : "缺資待補"}</strong>
                      </div>
                      <div class="strong-cell">
                        <span>營收訊號</span>
                        <strong><span class="badge ${signalTone}">${revenueSignal?.text || "缺資待補"}</span></strong>
                      </div>
                      <div class="strong-cell chain-cell">
                        <span>產業鏈</span>
                        <strong class="chain-list">${renderIndustryChain(row.code, row.name)}</strong>
                      </div>
                    </div>
                  </div>
                </div>
              `; }).join("")}
            </div>
          </article>
        `;
      } catch (error) {
        els.status.textContent = error.message || "查詢失敗";
        els.result.innerHTML = `<div class="panel empty">查詢失敗</div>`;
      } finally {
        els.strongButton.disabled = false;
        els.execute.disabled = false;
      }
    }

    els.date.value = todayYmd();
    const saved = localStorage.getItem("stockChipCode");
    if (saved) els.stock.value = saved;
    loadStockContexts();
    els.status.textContent = "請先選擇功能。";
    els.query.addEventListener("click", () => setActiveMode("query"));
    els.rankButton.addEventListener("click", () => setActiveMode("rank"));
    els.strongButton.addEventListener("click", () => setActiveMode("strong"));
    els.execute.addEventListener("click", executeActiveMode);
  </script>
</body>
</html>
