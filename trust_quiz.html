<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>我適合哪種信託？自我評量測驗</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Serif TC', 'Georgia', serif;
      background: #f5f0eb;
      color: #2c2c2c;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      background: #fff;
      border-radius: 20px;
      max-width: 680px;
      width: 100%;
      padding: 48px 40px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.10);
    }

    /* === INTRO SCREEN === */
    .intro h1 {
      font-size: 1.9rem;
      font-weight: 700;
      line-height: 1.4;
      color: #1a1a1a;
      margin-bottom: 12px;
    }
    .intro .subtitle {
      font-size: 1rem;
      color: #666;
      margin-bottom: 32px;
      line-height: 1.7;
    }
    .trust-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 36px;
    }
    .badge {
      background: #f0ece6;
      border-radius: 20px;
      padding: 6px 16px;
      font-size: 0.88rem;
      color: #5a4a3a;
      font-weight: 500;
    }

    /* === PROGRESS === */
    .progress-bar-wrap {
      height: 6px;
      background: #eee;
      border-radius: 10px;
      margin-bottom: 36px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, #c9a96e, #8b6914);
      border-radius: 10px;
      transition: width 0.4s ease;
    }
    .progress-label {
      font-size: 0.82rem;
      color: #999;
      margin-bottom: 8px;
      text-align: right;
    }

    /* === QUESTION === */
    .question-number {
      font-size: 0.82rem;
      color: #c9a96e;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .question-text {
      font-size: 1.3rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.5;
      margin-bottom: 28px;
    }

    /* === OPTIONS === */
    .options { display: flex; flex-direction: column; gap: 14px; }

    .option {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: #faf8f5;
      border: 2px solid #e8e2da;
      border-radius: 14px;
      padding: 16px 20px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .option:hover {
      border-color: #c9a96e;
      background: #fdf8f0;
    }
    .option.selected {
      border-color: #8b6914;
      background: #fdf3dd;
    }

    /* multi-select hint */
    .multi-hint {
      font-size: 0.82rem;
      color: #c9a96e;
      margin-bottom: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .multi-hint::before {
      content: '';
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid #c9a96e;
      border-radius: 4px;
      flex-shrink: 0;
    }

    /* checkmark indicator on multi-select */
    .option .check-indicator {
      width: 22px; height: 22px;
      border: 2px solid #ddd;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem;
      color: transparent;
      transition: all 0.2s;
      margin-top: 2px;
    }
    .option.selected .check-indicator {
      background: #8b6914;
      border-color: #8b6914;
      color: #fff;
    }
    .option-icon {
      font-size: 1.4rem;
      flex-shrink: 0;
      margin-top: 2px;
    }
    .option-content { flex: 1; }
    .option-label {
      font-size: 1rem;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 3px;
    }
    .option-desc {
      font-size: 0.85rem;
      color: #777;
      line-height: 1.5;
    }

    /* === BUTTONS === */
    .btn {
      display: inline-block;
      padding: 14px 36px;
      border-radius: 50px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }
    .btn-primary {
      background: linear-gradient(135deg, #c9a96e, #8b6914);
      color: #fff;
      box-shadow: 0 4px 16px rgba(139,105,20,0.3);
    }
    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }
    .btn-primary:disabled {
      background: #ddd;
      color: #aaa;
      box-shadow: none;
      transform: none;
      cursor: not-allowed;
    }
    .btn-secondary {
      background: transparent;
      color: #999;
      border: 2px solid #e0e0e0;
      margin-right: 12px;
    }
    .btn-secondary:hover { border-color: #bbb; color: #666; }

    .action-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 36px;
    }

    /* === RESULT === */
    .result-header {
      text-align: center;
      margin-bottom: 36px;
    }
    .result-emoji { font-size: 3.5rem; margin-bottom: 16px; }
    .result-title {
      font-size: 1.6rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 8px;
    }
    .result-subtitle { font-size: 0.95rem; color: #777; line-height: 1.6; }

    .result-cards { display: flex; flex-direction: column; gap: 16px; margin-bottom: 32px; }
    .result-card {
      border-radius: 16px;
      padding: 20px 24px;
      border-left: 5px solid;
    }
    .result-card.primary { background: #fdf3dd; border-color: #c9a96e; }
    .result-card.secondary { background: #f0f7ff; border-color: #6fa8dc; }
    .result-card.tertiary { background: #f0fbf4; border-color: #6db57a; }

    .result-card-label {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 6px;
      color: #888;
    }
    .result-card-name {
      font-size: 1.15rem;
      font-weight: 700;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .result-card-desc {
      font-size: 0.88rem;
      color: #555;
      line-height: 1.6;
    }

    .score-bar-wrap {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 10px;
    }
    .score-bar-bg {
      flex: 1;
      height: 8px;
      background: #e0e0e0;
      border-radius: 10px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 10px;
      transition: width 1s ease;
    }
    .score-pct { font-size: 0.82rem; color: #888; min-width: 36px; text-align: right; }

    .result-cta {
      text-align: center;
      background: #f5f0eb;
      border-radius: 14px;
      padding: 20px;
      font-size: 0.9rem;
      color: #666;
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .result-cta strong { color: #1a1a1a; }

    .btn-restart {
      display: block;
      text-align: center;
      margin: 0 auto;
    }

    .hidden { display: none !important; }

    @media (max-width: 480px) {
      .container { padding: 32px 24px; }
      .intro h1 { font-size: 1.5rem; }
      .question-text { font-size: 1.1rem; }
    }
  </style>
</head>
<body>
<div class="container">

  <!-- INTRO -->
  <div id="screen-intro" class="intro">
    <h1>我適合哪種信託？</h1>
    <p class="subtitle">
      只需回答 8 個問題，幫助你了解自己的財務需求<br>
      找到最適合的信託規劃方向。
    </p>
    <div class="trust-badges">
      <span class="badge">安養信託</span>

      <span class="badge">遺囑信託</span>

      <span class="badge">不動產信託</span>
      <span class="badge">特殊需求信託</span>
    </div>
    <button class="btn btn-primary" onclick="startQuiz()">開始測驗</button>
  </div>

  <!-- QUIZ -->
  <div id="screen-quiz" class="hidden">
    <div class="progress-label" id="progress-label">第 1 題，共 8 題</div>
    <div class="progress-bar-wrap">
      <div class="progress-bar" id="progress-bar" style="width:0%"></div>
    </div>

    <div class="question-number" id="q-number">Q1</div>
    <div class="question-text" id="q-text"></div>
    <div class="options" id="q-options"></div>

    <div class="action-row">
      <button class="btn btn-secondary" id="btn-prev" onclick="prevQuestion()">上一題</button>
      <button class="btn btn-primary" id="btn-next" onclick="nextQuestion()" disabled>下一題</button>
    </div>
  </div>

  <!-- RESULT -->
  <div id="screen-result" class="hidden">
    <div class="result-header">
      <div class="result-emoji" id="result-emoji"></div>
      <div class="result-title" id="result-title"></div>
      <div class="result-subtitle" id="result-subtitle"></div>
    </div>

    <div class="result-cards" id="result-cards"></div>

    <div class="result-cta">

      <strong>IFA 獨立財務顧問｜Esther｜私人銀行 境內外信託 財富傳承 保本儲蓄</strong>
    </div>

    <button class="btn btn-primary btn-restart" onclick="restartQuiz()">重新測驗</button>
  </div>

</div>

    will: {
      name: '遺囑信託',
      emoji: '🏛️',
      color: '#8e44ad',
      barColor: '#8e44ad',
      cardClass: 'tertiary',
      desc: '在遺囑中指定信託安排，身後由信託機構執行財產分配，可附加條件與時間規劃，有效避免家族爭產並實現傳承意志。'
    },
    charity: {
      name: '公益信託',
      emoji: '🌱',
      color: '#6db57a',
      barColor: '#6db57a',
      cardClass: 'tertiary',
      desc: '以部分財富設立公益目的信託，由信託機構持續運作公益事業，讓財富發揮長遠社會影響力，也可享有部分稅務優惠。'
    },
    insure: {
      name: '保險金信託',
      emoji: '📋',
      color: '#e07b54',
      barColor: '#e07b54',
      cardClass: 'secondary',
      desc: '將人壽保險的身故理賠金預先指定交付信託管理，避免鉅額理賠金一次性發放後被揮霍，可依設定條件分期給付受益人，是保障家人的雙重防護。'
    },
    realty: {
      name: '不動產信託',
      emoji: '🏠',
      color: '#5b8db8',
      barColor: '#5b8db8',
      cardClass: 'secondary',
      desc: '將房地產移轉至信託名下，由信託機構依委託人指示管理、出租或於特定條件下處分，有效避免房產在繼承時被低價拍賣或引發家族糾紛，也常用於預售屋價金保障。'
    },
    special: {
      name: '特殊需求信託',
      emoji: '💝',
      color: '#9b6bb5',
      barColor: '#9b6bb5',
      cardClass: 'tertiary',
      desc: '專為有身心障礙、罕見疾病或長期失能家人所設立，確保照護費用來源不中斷。即使委託人離世，信託機構仍依約持續支付受益人的生活與醫療開銷，給家人最長遠的安心。'
    }
  };

  let currentQ = 0;
  // answers: single -> number | undefined, multi -> Set of indices
  let answers = {};

  function startQuiz() {
    document.getElementById('screen-intro').classList.add('hidden');
    document.getElementById('screen-quiz').classList.remove('hidden');
    renderQuestion();
  }

  function isAnswered(q) {
    if (q.multi) {
      return answers[q.id] instanceof Set && answers[q.id].size > 0;
    }
    return answers[q.id] !== undefined;
  }

  function renderQuestion() {
    const q = questions[currentQ];
    const total = questions.length;

    document.getElementById('progress-label').textContent = `第 ${currentQ + 1} 題，共 ${total} 題`;
    document.getElementById('progress-bar').style.width = `${((currentQ) / total) * 100}%`;
    document.getElementById('q-number').textContent = `Q${currentQ + 1}`;
    document.getElementById('q-text').textContent = q.text;

    const container = document.getElementById('q-options');
    container.innerHTML = '';

    // hint for multi-select
    if (q.multi) {
      const hint = document.createElement('div');
      hint.className = 'multi-hint';
      hint.textContent = '可選擇多個選項';
      container.appendChild(hint);
    }

    const selectedSet = q.multi
      ? (answers[q.id] instanceof Set ? answers[q.id] : new Set())
      : null;

    q.options.forEach((opt, idx) => {
      const isSelected = q.multi ? selectedSet.has(idx) : answers[q.id] === idx;
      const div = document.createElement('div');
      div.className = 'option' + (isSelected ? ' selected' : '');
      div.innerHTML = `
        <div class="option-icon">${opt.icon}</div>
        <div class="option-content">
          <div class="option-label">${opt.label}</div>
          ${opt.desc ? `<div class="option-desc">${opt.desc}</div>` : ''}
        </div>
        ${q.multi ? '<div class="check-indicator">&#10003;</div>' : ''}
      `;
      div.dataset.idx = idx;
      div.onclick = () => selectOption(idx);
      container.appendChild(div);
    });

    document.getElementById('btn-prev').style.visibility = currentQ === 0 ? 'hidden' : 'visible';
    document.getElementById('btn-next').textContent = currentQ === total - 1 ? '查看結果' : '下一題';
    document.getElementById('btn-next').disabled = !isAnswered(q);
  }

  function selectOption(idx) {
    const q = questions[currentQ];

    if (q.multi) {
      if (!(answers[q.id] instanceof Set)) answers[q.id] = new Set();
      if (answers[q.id].has(idx)) {
        answers[q.id].delete(idx);
      } else {
        answers[q.id].add(idx);
      }
      document.querySelectorAll('.option').forEach(el => {
        el.classList.toggle('selected', answers[q.id].has(Number(el.dataset.idx)));
      });
    } else {
      answers[q.id] = idx;
      document.querySelectorAll('.option').forEach(el => {
        el.classList.toggle('selected', Number(el.dataset.idx) === idx);
      });
    }

    document.getElementById('btn-next').disabled = !isAnswered(q);
  }

  function nextQuestion() {
    if (currentQ < questions.length - 1) {
      currentQ++;
      renderQuestion();
    } else {
      showResult();
    }
  }

  function prevQuestion() {
    if (currentQ > 0) {
      currentQ--;
      renderQuestion();
    }
  }

  function showResult() {
    const scores = { elder: 0, edu: 0, will: 0, charity: 0 };

    questions.forEach(q => {
      if (q.multi) {
        const sel = answers[q.id];
        if (sel instanceof Set) {
          sel.forEach(idx => {
            const s = q.options[idx].scores;
            for (const key in s) scores[key] += s[key];
          });
        }
      } else {
        const selectedIdx = answers[q.id];
        if (selectedIdx !== undefined) {
          const s = q.options[selectedIdx].scores;
          for (const key in s) scores[key] += s[key];
        }
      }
    });

    const maxScore = Math.max(...Object.values(scores));
    const sorted = Object.entries(scores)
      .sort((a, b) => b[1] - a[1]);

    const top = sorted[0][0];
    const info = trustInfo[top];

    document.getElementById('screen-quiz').classList.add('hidden');
    document.getElementById('screen-result').classList.remove('hidden');

    document.getElementById('result-emoji').textContent = info.emoji;
    document.getElementById('result-title').textContent = `最適合您的是「${info.name}」`;
    document.getElementById('result-subtitle').textContent =
      '根據您的回答，以下是個人化的信託規劃建議';

    const cardsEl = document.getElementById('result-cards');
    cardsEl.innerHTML = '';

    const labels = ['最推薦', '次要考慮', '也值得了解'];
    sorted.slice(0, 3).forEach(([key, score], i) => {
      const t = trustInfo[key];
      const pct = maxScore > 0 ? Math.round((score / maxScore) * 100) : 0;
      const div = document.createElement('div');
      div.className = `result-card ${i === 0 ? 'primary' : i === 1 ? 'secondary' : 'tertiary'}`;
      div.innerHTML = `
        <div class="result-card-label">${labels[i]}</div>
        <div class="result-card-name">${t.emoji} ${t.name}</div>
        <div class="result-card-desc">${t.desc}</div>
        <div class="score-bar-wrap">
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:0%; background:${t.barColor}" data-pct="${pct}"></div>
          </div>
          <div class="score-pct">${pct}%</div>
        </div>
      `;
      cardsEl.appendChild(div);
    });

    setTimeout(() => {
      document.querySelectorAll('.score-bar-fill').forEach(el => {
        el.style.width = el.dataset.pct + '%';
      });
    }, 100);

    document.getElementById('progress-bar').style.width = '100%';
  }

  function restartQuiz() {
    currentQ = 0;
    answers = {};
    document.getElementById('screen-result').classList.add('hidden');
    document.getElementById('screen-intro').classList.remove('hidden');
  }

</script>
</body>
</html>
